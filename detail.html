<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KitaABSENSI - Employee Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="assets/css/kita-absensi.css" />
</head>
<body>

    <!-- ═══ FLOATING HOME ═══ -->
    <button class="btn-floating-home" @click="goHome()" aria-label="Go Home">
        <i class="bi bi-house-door-fill"></i>
    </button>

    <!-- ═══ MAIN APP ═══ -->
    <div x-data="detailApp()" x-init="init()" 
         class="container-fluid d-flex align-items-start justify-content-center min-vh-100 bg-light-maroon p-3 p-md-4 p-lg-5">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-7 col-xxl-6">
                <div class="app-container p-0 shadow-lg rounded-4 bg-white overflow-hidden">

                    <!-- Header -->
                    <header class="app-header p-3 p-sm-4 text-white rounded-top-4">
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <div class="brand d-flex align-items-center gap-2">
                                <i class="bi bi-person-lines-fill fs-1" style="color: #f0d0d0;"></i>
                                <span class="fw-bold fs-2 fs-sm-3">Employee Detail</span>
                                <span class="badge bg-maroon-light text-maroon small ms-1">v1</span>
                            </div>
                            <div class="clock bg-dark bg-opacity-25 px-3 py-1 rounded-pill fw-semibold d-flex align-items-center gap-2">
                                <i class="bi bi-clock"></i> <span x-text="currentTime"></span>
                            </div>
                        </div>
                    </header>

                    <!-- Body -->
                    <main class="app-body p-3 p-sm-4 p-md-5">
                        <div x-show="loading" class="text-center py-4">
                            <div class="spinner-border" style="color: #7a2a3a;" role="status"></div>
                            <p class="mt-2">Loading...</p>
                        </div>

                        <div x-show="!loading && employee">
                            <h4 class="fw-bold" style="color: #7a2a3a;" x-text="employee.nama"></h4>
                            <p class="text-secondary">
                                <i class="bi bi-building me-1"></i> <strong>Outlet:</strong> <span x-text="employee.outlet_name"></span>
                                &nbsp;|&nbsp;
                                <i class="bi bi-clock-history me-1"></i> <strong>Shift:</strong> <span x-text="employee.shift_name"></span>
                                &nbsp;|&nbsp;
                                <i class="bi bi-calendar-check me-1"></i> <strong>Total Presence:</strong> <span x-text="employee.total_absen"></span>
                            </p>
                            <hr style="border-color: #dcc8c8;" />

                            <h6 class="fw-bold" style="color: #7a2a3a;"><i class="bi bi-calendar-event me-2"></i> Presence History</h6>
                            <div class="table-responsive">
                                <table class="table table-bordered table-hover align-middle">
                                    <thead class="table-maroon">
                                        <tr>
                                            <th>#</th>
                                            <th>Date</th>
                                            <th>Shift</th>
                                            <th>Check In</th>
                                            <th>Check Out</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-if="employee.history.length === 0">
                                            <tr>
                                                <td colspan="6" class="text-center text-secondary">No history available</td>
                                            </tr>
                                        </template>
                                        <template x-for="(log, idx) in employee.history" :key="idx">
                                            <tr :class="getRowClass(log.status)">
                                                <td x-text="idx + 1"></td>
                                                <td x-text="log.date_formatted"></td>
                                                <td x-text="log.shift"></td>
                                                <td x-text="log.check_in || '-'"></td>
                                                <td x-text="log.check_out || '-'"></td>
                                                <td>
                                                    <span class="badge" :class="getBadgeClass(log.status)" x-text="getStatusLabel(log.status)"></span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div x-show="!loading && !employee" class="alert alert-warning rounded-4 text-center">
                            <i class="bi bi-exclamation-triangle me-2"></i> Employee not found.
                        </div>

                        <div class="mt-3 text-center">
                            <a href="rekap.html" class="btn btn-outline-maroon rounded-pill px-4">
                                <i class="bi bi-arrow-left me-2"></i> Back to Recap
                            </a>
                        </div>
                    </main>

                    <!-- Footer -->
                    <footer class="app-footer p-3 text-center text-secondary-emphasis border-top" style="border-top-color: #dcc8c8;">
                        &copy; 2026 KitaABSENSI &middot; Detailed presence history
                    </footer>

                </div>
            </div>
        </div>
    </div>

    <!-- ═══ TOAST MODAL ═══ -->
    <div class="modal fade" id="toastModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4" style="border: 2px solid #7a2a3a;">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-check-circle-fill fs-1" style="color: #7a2a3a;"></i>
                    <p class="toast-message fs-5 mt-2 fw-semibold" style="color: #3d1a1a;"></p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-maroon rounded-pill px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/kita-absensi.js"></script>
</body>
</html>
