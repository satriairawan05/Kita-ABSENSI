<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>KitaABSENSI - Employee Detail</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/kita-absensi.min.css" />
</head>
<body id="home" x-data="detailApp()" x-init="init()">

    <!-- Floating Home -->
    <button class="btn-floating-home" @click="goHome()" aria-label="Go Home">
        <i class="bi bi-house-door-fill"></i>
    </button>

    <div class="container-fluid d-flex align-items-start justify-content-center min-vh-100 bg-light-maroon p-2 p-sm-3 p-md-4 p-lg-5">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-7 col-xxl-6">
                <div class="app-container p-0 shadow-lg rounded-4 bg-white overflow-hidden">

                    <header class="app-header p-3 p-sm-4 text-white rounded-top-4">
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <div class="brand d-flex align-items-center gap-2">
                                <i class="bi bi-person-lines-fill fs-1" style="color: #f0d0d0;"></i>
                                <span class="fw-bold fs-2 fs-sm-3">Employee Detail</span>
                                <span class="badge bg-maroon-light text-maroon small ms-1">v1</span>
                            </div>
                            <div class="clock bg-dark bg-opacity-25 px-3 py-1 rounded-pill fw-semibold d-flex align-items-center gap-2">
                                <i class="bi bi-clock"></i> <span x-text="currentTime"></span>
                            </div>
                        </div>
                    </header>

                    <main class="app-body p-3 p-sm-4 p-md-5">
                        <!-- Loading -->
                        <div x-show="loading" class="text-center py-5">
                            <div class="spinner-border" style="color: #7a2a3a;" role="status"></div>
                            <p class="mt-3 text-secondary">Loading employee data...</p>
                        </div>

                        <!-- Detail Employee -->
                        <div x-show="!loading && employee">
                            <h4 class="fw-bold" style="color: #7a2a3a;" x-text="employee.nama"></h4>
                            <p class="text-secondary" style="font-size: 0.9rem;">
                                <i class="bi bi-building me-1"></i> <strong>Outlet:</strong> <span x-text="employee.outlet_name"></span>
                                &nbsp;|&nbsp;
                                <i class="bi bi-clock-history me-1"></i> <strong>Shift:</strong> <span x-text="employee.shift_name"></span>
                                &nbsp;|&nbsp;
                                <i class="bi bi-calendar-check me-1"></i> <strong>Total Presence:</strong> <span x-text="employee.total_absen"></span>
                                &nbsp;|&nbsp;
                                <i class="bi bi-flag me-1"></i> <strong>Last Status:</strong>
                                <span class="badge" :class="getBadgeClass(employee.status)" x-text="getStatusLabel(employee.status)"></span>
                            </p>
                            <hr style="border-color: #dcc8c8;" />

                            <h6 class="fw-bold" style="color: #7a2a3a; font-size: 1rem;"><i class="bi bi-calendar-event me-2"></i> Presence Calendar</h6>

                            <!-- ═══ KALENDER MANUAL ═══ -->
                            <div class="calendar-wrapper mt-2">
                                <!-- Navigasi -->
                                <div class="d-flex align-items-center justify-content-between mb-2">
                                    <button class="btn btn-outline-maroon rounded-pill px-3 py-1" 
                                            @click="prevMonth" 
                                            :disabled="!canPrev"
                                            style="font-size: 0.9rem;">
                                        <i class="bi bi-chevron-left"></i>
                                    </button>
                                    <span class="fw-bold fs-6" style="color: #7a2a3a;" x-text="currentMonthYear"></span>
                                    <button class="btn btn-outline-maroon rounded-pill px-3 py-1" 
                                            @click="nextMonth" 
                                            :disabled="!canNext"
                                            style="font-size: 0.9rem;">
                                        <i class="bi bi-chevron-right"></i>
                                    </button>
                                </div>

                                <!-- Header Hari (Minggu–Sabtu) -->
                                <div class="calendar-header-grid">
                                    <div class="col">Sun</div>
                                    <div class="col">Mon</div>
                                    <div class="col">Tue</div>
                                    <div class="col">Wed</div>
                                    <div class="col">Thu</div>
                                    <div class="col">Fri</div>
                                    <div class="col">Sat</div>
                                </div>

                                <!-- Grid Tanggal -->
                                <div class="calendar-body-grid">
                                    <template x-for="(day, index) in calendarDays" :key="index">
                                        <div class="calendar-day-cell" :class="getDayClass(day)" x-show="day">
                                            <span class="day-number" x-text="day.date"></span>
                                        </div>
                                        <div class="calendar-day-cell empty-cell" x-show="!day"></div>
                                    </template>
                                </div>

                                <!-- Legend -->
                                <div class="mt-3 d-flex flex-wrap gap-2 justify-content-center">
                                    <span class="badge bg-success p-2" style="font-size: 0.7rem;">🟢 On Time</span>
                                    <span class="badge bg-warning text-dark p-2" style="font-size: 0.7rem;">🟡 Late 5-15</span>
                                    <span class="badge bg-danger p-2" style="font-size: 0.7rem;">🔴 Late 30-60</span>
                                    <span class="badge bg-secondary bg-opacity-25 text-secondary p-2" style="font-size: 0.7rem;">⚪ No Data / OFF</span>
                                </div>
                            </div>
                        </div>

                        <!-- Not Found -->
                        <div x-show="!loading && !employee" class="alert alert-warning rounded-4 text-center">
                            <i class="bi bi-exclamation-triangle me-2"></i> Employee not found.
                        </div>

                        <!-- Back -->
                        <div class="mt-3 text-center">
                            <a href="rekap.html" class="btn btn-outline-maroon rounded-pill px-4">
                                <i class="bi bi-arrow-left me-2"></i> Back to Recap
                            </a>
                        </div>
                    </main>

                    <footer class="app-footer p-3 text-center text-secondary-emphasis border-top" style="border-top-color: #dcc8c8; font-size: 0.7rem;">
                        &copy; 2026 KitaABSENSI &middot; Detailed presence history
                    </footer>

                </div>
            </div>
        </div>
    </div>

    <!-- Toast Modal -->
    <div class="modal fade" id="toastModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4" style="border: 2px solid #7a2a3a;">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-check-circle-fill fs-1" style="color: #7a2a3a;"></i>
                    <p class="toast-message fs-5 mt-2 fw-semibold" style="color: #3d1a1a;"></p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-maroon rounded-pill px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/kita-absensi.min.js"></script>
</body>
</html>
