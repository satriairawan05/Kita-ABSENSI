<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KitaABSENSI - Presence Recap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="assets/css/kita-absensi.css" />
</head>
<body id="home" x-data="rekapApp()" x-init="init()">

    <!-- ═══ FLOATING HOME ═══ -->
    <button class="btn-floating-home" @click="goHome()" aria-label="Go Home">
        <i class="bi bi-house-door-fill"></i>
    </button>

    <!-- ═══ MAIN APP ═══ -->
    <div class="container-fluid d-flex align-items-start justify-content-center min-vh-100 bg-light-maroon p-3 p-md-4 p-lg-5">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-sm-10 col-md-9 col-lg-8 col-xl-7 col-xxl-6">
                <div class="app-container p-0 shadow-lg rounded-4 bg-white overflow-hidden">

                    <!-- Header -->
                    <header class="app-header p-3 p-sm-4 text-white rounded-top-4">
                        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
                            <div class="brand d-flex align-items-center gap-2">
                                <i class="bi bi-clipboard-data fs-1" style="color: #f0d0d0;"></i>
                                <span class="fw-bold fs-2 fs-sm-3">Presence Recap</span>
                                <span class="badge bg-maroon-light text-maroon small ms-1">v1</span>
                            </div>
                            <div class="clock bg-dark bg-opacity-25 px-3 py-1 rounded-pill fw-semibold d-flex align-items-center gap-2">
                                <i class="bi bi-clock"></i> <span x-text="currentTime"></span>
                            </div>
                        </div>
                    </header>

                    <!-- Body -->
                    <main class="app-body p-3 p-sm-4 p-md-5">

                        <!-- Filter -->
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="color: #3d1a1a;">Filter by Outlet</label>
                                <select class="form-select border-2 rounded-4" style="border-color: #dcc8c8;"
                                        x-model="selectedOutletId" @change="applyFilter()">
                                    <option value="">All Outlets</option>
                                    <template x-for="outlet in outlets" :key="outlet.id">
                                        <option :value="outlet.id" x-text="outlet.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold" style="color: #3d1a1a;">Filter by Shift</label>
                                <select class="form-select border-2 rounded-4" style="border-color: #dcc8c8;"
                                        x-model="selectedShiftId" @change="applyFilter()">
                                    <option value="">All Shifts</option>
                                    <template x-for="shift in shifts" :key="shift.id">
                                        <option :value="shift.id" x-text="shift.name"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <h5 class="fw-bold" style="color: #7a2a3a;"><i class="bi bi-people me-2"></i> Employee List</h5>

                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle">
                                <thead class="table-maroon">
                                    <tr>
                                        <th>#</th>
                                        <th>Name</th>
                                        <th>Outlet</th>
                                        <th>Shift</th>
                                        <th>Total Presence</th>
                                        <th>Last Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-if="filteredData.length === 0">
                                        <tr>
                                            <td colspan="6" class="text-center text-secondary">No employees found</td>
                                        </tr>
                                    </template>
                                    <template x-for="(item, index) in filteredData" :key="item.id">
                                        <tr :class="getRowClass(item.status)" style="cursor:pointer;" @click="viewDetail(item.id)">
                                            <td x-text="index + 1"></td>
                                            <td x-text="item.nama"></td>
                                            <td x-text="outlets.find(o => o.id === item.outlet_id)?.name || '-'"></td>
                                            <td x-text="shifts.find(s => s.id === item.shift_id)?.name || '-'"></td>
                                            <td x-text="item.total_absen"></td>
                                            <td>
                                                <span class="badge" :class="getBadgeClass(item.status)" x-text="getStatusLabel(item.status)"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>

                        <!-- Legend -->
                        <div class="mt-3 d-flex flex-wrap gap-3">
                            <span class="badge bg-maroon-light text-maroon p-2" style="background-color: #d4a0a0; color: #3d1a1a;">Maroon: on-time (first 3 days)</span>
                            <span class="badge bg-warning text-dark p-2">Yellow: late 5–15 min</span>
                            <span class="badge bg-danger p-2">Red: late 30 min – 1 hour</span>
                        </div>

                        <div class="mt-3 text-center">
                            <a href="index.html" class="btn btn-outline-maroon rounded-pill px-4">
                                <i class="bi bi-arrow-left me-2"></i> Back to Presence
                            </a>
                        </div>
                    </main>

                    <!-- Footer -->
                    <footer class="app-footer p-3 text-center text-secondary-emphasis border-top" style="border-top-color: #dcc8c8;">
                        &copy; 2026 KitaABSENSI &middot; Employee presence recap
                    </footer>

                </div>
            </div>
        </div>
    </div>

    <!-- ═══ TOAST MODAL ═══ -->
    <div class="modal fade" id="toastModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4" style="border: 2px solid #7a2a3a;">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-check-circle-fill fs-1" style="color: #7a2a3a;"></i>
                    <p class="toast-message fs-5 mt-2 fw-semibold" style="color: #3d1a1a;"></p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-maroon rounded-pill px-4" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/kita-absensi.js"></script>
</body>
</html>
